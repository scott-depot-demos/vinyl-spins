    "version": 1,
    "install": {
      "curl": {
        "pkg-path": "curl"
      },
      "git": {
        "pkg-path": "git"
      },
      "go": {
        "pkg-path": "go"
      },
      "golangci-lint": {
        "pkg-path": "golangci-lint"
      },
      "jq": {
        "pkg-path": "jq"
      },
      "just": {
        "pkg-path": "just"
      },
      "nodejs_22": {
        "pkg-path": "nodejs_22"
      },
      "openssl": {
        "pkg-path": "openssl"
      },
      "pnpm_10": {
        "pkg-path": "pnpm_10"
      },
      "postgresql_16": {
        "pkg-path": "postgresql_16"
      },
      "sqlc": {
        "pkg-path": "sqlc"
      }
    },
    "vars": {
      "API_URL": "http://localhost:8080",
      "DISCOGS_OAUTH_CALLBACK_URL": "http://localhost:8080/auth/discogs/callback",
      "PGHOST": "127.0.0.1",
      "PGPORT": "5432",
      "UI_URL": "http://localhost:5173"
    },
    "hook": {
      "on-activate": "set -euo pipefail\n\n# Project root is stable even if the shell starts elsewhere\nexport PROJECT_ROOT=\"${FLOX_ENV_PROJECT:-$PWD}\"\n\n# Postgres data/socket dirs live in Flox cache so they don't pollute the repo\nexport FLOX_PGDATA=\"${FLOX_ENV_CACHE}/postgres\"\nexport FLOX_PGSOCK=\"${FLOX_ENV_CACHE}/pgsock\"\n\nmkdir -p \"${FLOX_PGSOCK}\"\n\n# Initialize a local Postgres cluster the first time you activate\nif [ ! -d \"${FLOX_PGDATA}/base\" ]; then\n  initdb -D \"${FLOX_PGDATA}\" >/dev/null\n  {\n    echo \"listen_addresses = '127.0.0.1'\"\n    echo \"unix_socket_directories = '${FLOX_PGSOCK}'\"\n    echo \"port = 5432\"\n  } >> \"${FLOX_PGDATA}/postgresql.conf\"\nfi\n"
    },
    "profile": {
      "common": "export PROJECT_ROOT=\"${PROJECT_ROOT:-${FLOX_ENV_PROJECT:-$PWD}}\"\n\nalias repo='cd \"$PROJECT_ROOT\"'\nalias pg-start='flox services start postgres'\nalias pg-stop='flox services stop postgres'\nalias pg-status='flox services status'\n\n# (These will become active once `backend/` and `frontend/` are scaffolded.)\nalias api='(cd \"$PROJECT_ROOT/backend\" && go run ./cmd/api)'\nalias ui='(cd \"$PROJECT_ROOT/frontend\" && pnpm dev)'\n"
    },
    "options": {},
    "services": {
      "postgres": {
        "command": "postgres -D \"${FLOX_PGDATA}\" -k \"${FLOX_PGSOCK}\" -p 5432\n"
      }
    }
  },
