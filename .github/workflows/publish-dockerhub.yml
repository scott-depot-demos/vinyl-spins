name: Build & Push Docker Images (Docker Hub)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: publish-dockerhub-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Docker Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USER }}/vst-api:${{ github.sha }}
            ${{ secrets.DOCKER_USER }}/vst-api:latest
          build-args: |
            DEMO_BIG=0
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker Build & push UI (prod) image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: Dockerfile.prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USER }}/vst-ui:${{ github.sha }}
            ${{ secrets.DOCKER_USER }}/vst-ui:latest
          build-args: |
            DEMO_BIG=0
          cache-from: type=gha
          cache-to: type=gha,mode=max

