services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: discogs
      POSTGRES_PASSWORD: discogs
      POSTGRES_DB: discogs_listen_tracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ..
      dockerfile: discogs-listen-tracker/backend/Dockerfile
    env_file:
      - .env
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://discogs:discogs@db:5432/discogs_listen_tracker?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      - db

  migrate:
    build:
      context: ..
      dockerfile: discogs-listen-tracker/backend/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://discogs:discogs@db:5432/discogs_listen_tracker?sslmode=disable
    command: ["migrate", "up"]
    depends_on:
      - db

  ui:
    build:
      context: ..
      dockerfile: discogs-listen-tracker/frontend/Dockerfile
    environment:
      VITE_API_URL: http://localhost:8080
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  pgdata:

